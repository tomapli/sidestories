name: CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_COLOR: 3
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  deploy-supabase:
    name: Deploy Supabase
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: production
    steps:
      - uses: actions/checkout@v5

      - name: Setup
        uses: ./tooling/github/setup

      - name: Write database environment
        shell: bash
        run: |
          {
            echo "POSTGRES_URL=${POSTGRES_MIGRATION_URL}"
          } > .env
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_MIGRATION_URL }}

      # Applies the migration files committed under supabase/drizzle. This is
      # non-interactive: it can only run schema decisions that were already made
      # (and reviewed) via `pnpm db:generate`. Anything not captured in a
      # committed migration is simply not deployed.
      - name: Apply database migrations
        run: pnpm db:migrate
